<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2HOURSFLEX</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-shell">

  <div class="hamburger" id="burgerBtn"><span></span><span></span><span></span></div>

  <div class="side-menu" id="sideMenu">
    <div class="side-menu-close" id="sideMenuClose">&#x2715;</div>
    <div class="side-menu-content">
      <h2>2HOURSFLEX</h2>
      <p>J might or might not put more stuff in here in the future.</p>
      <p class="side-menu-hint">Stay tuned... or don't.</p>
      <div style="margin-top:24px;">
        <a href="/">&#x1F3E0; Home</a>
        <a href="/chill-200cpm/">&#x1F3AE; Chill 200CPM</a>
        <a href="/loading-fighters/">&#x1F3AE; Loading Fighters</a>
        <a href="/sundar-keti/">&#x2764;&#xFE0F; Sundar Keti</a>
      </div>
      <p class="menu-email"><a href="mailto:onchainflyer@gmail.com">onchainflyer@gmail.com</a></p>
    </div>
  </div>
  <div class="side-menu-overlay" id="sideMenuOverlay"></div>

  <div class="device-zone">
    <div class="game-canvas-container">
      <canvas id="gameCanvas"></canvas>
    </div>
    <div class="device-frame">
      <img id="frameImg" alt="" />
    </div>
  </div>

  <div class="controls-zone">
    <div class="controls-main">
      <div class="dpad-container">
        <div class="dpad-btn dpad-up" data-dir="up" id="btnUp">&#x25B2;</div>
        <div class="dpad-btn dpad-down" data-dir="down" id="btnDown">&#x25BC;</div>
        <div class="dpad-btn dpad-left" data-dir="left">&#x25C4;</div>
        <div class="dpad-btn dpad-right" data-dir="right">&#x25BA;</div>
      </div>
      <div class="action-container">
        <div class="action-btn btn-a" data-btn="A" id="btnA">A</div>
        <div class="action-btn btn-b" data-btn="B">B</div>
      </div>
    </div>
    <div class="system-btns">
      <div class="sys-btn" data-btn="select">Select</div>
      <div class="sys-btn" data-btn="start">Start</div>
    </div>
  </div>

</div>

<script>
// --- Frame (same pattern as Loading Fighters) ---
document.getElementById('frameImg').src = 'assets/zebraframe.png';

// --- Canvas setup ---
var canvas = document.getElementById('gameCanvas');
canvas.width = 500;
canvas.height = 320;
var ctx = canvas.getContext('2d');

// --- Background image ---
var bgImg = new Image();
var bgLoaded = false;
bgImg.onload = function() {
  console.log('BG loaded OK:', bgImg.width, 'x', bgImg.height);
  bgLoaded = true;
  render();
};
bgImg.onerror = function() {
  console.error('BG FAILED to load');
  bgLoaded = true;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, 500, 320);
  render();
};
bgImg.src = 'assets/landing-bg.jpg';

// --- State ---
var selectedIndex = 0;
var menuItems = [
  { label: 'Chill 200CPM', url: '/chill-200cpm/' },
  { label: 'Loading Fighters', url: '/loading-fighters/' }
];

// --- Sparkle particles ---
var sparkles = [];
function createSparkle() {
  return {
    x: Math.random() * 500,
    y: Math.random() * 320,
    size: Math.random() * 3 + 1,
    alpha: Math.random(),
    speed: Math.random() * 0.5 + 0.2,
    phase: Math.random() * Math.PI * 2,
    color: Math.random() > 0.4 ? '#d4e20f' : '#fff'
  };
}
for (var i = 0; i < 40; i++) sparkles.push(createSparkle());

function drawStar(cx, cy, outerR, innerR) {
  ctx.beginPath();
  for (var j = 0; j < 8; j++) {
    var r = j % 2 === 0 ? outerR : innerR;
    var a = (Math.PI / 4) * j - Math.PI / 2;
    ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
}

function updateSparkles() {
  for (var i = 0; i < sparkles.length; i++) {
    var s = sparkles[i];
    s.phase += 0.03;
    s.y -= s.speed;
    s.alpha = 0.3 + Math.sin(s.phase) * 0.5;
    if (s.y < -5) { s.y = 325; s.x = Math.random() * 500; }
  }
}

function drawSparkles() {
  for (var i = 0; i < sparkles.length; i++) {
    var s = sparkles[i];
    if (s.alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.alpha);
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = s.size * 3;
    drawStar(s.x, s.y, s.size, s.size * 0.4);
    ctx.restore();
  }
}

// --- Scanlines ---
function drawScanlines() {
  ctx.fillStyle = 'rgba(212, 226, 15, 0.012)';
  for (var y = 0; y < 320; y += 3) ctx.fillRect(0, y, 500, 1);
}

// --- Title at top ---
function drawTitle() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 20px "Orbitron", monospace';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText('2HOURSFLEX', 251, 25);
  ctx.fillStyle = '#d4e20f';
  ctx.shadowColor = '#d4e20f';
  ctx.shadowBlur = 14;
  ctx.fillText('2HOURSFLEX', 250, 24);
  ctx.shadowBlur = 7;
  ctx.fillText('2HOURSFLEX', 250, 24);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- RPG Dialogue Box ---
function drawDialogueBox() {
  var bx = 14, by = 200, bw = 472, bh = 110;
  var r = 6;

  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(ctx, bx + 3, by + 3, bw, bh, r);
  ctx.fill();

  ctx.fillStyle = 'rgba(8, 8, 20, 0.50)';
  roundRect(ctx, bx, by, bw, bh, r);
  ctx.fill();

  ctx.strokeStyle = '#d4e20f';
  ctx.lineWidth = 2;
  roundRect(ctx, bx, by, bw, bh, r);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(212, 226, 15, 0.12)';
  ctx.lineWidth = 1;
  roundRect(ctx, bx + 4, by + 4, bw - 8, bh - 8, r - 1);
  ctx.stroke();

  ctx.font = 'bold 14px "Press Start 2P", monospace';
  ctx.fillStyle = '#d4e20f';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#d4e20f';
  ctx.shadowBlur = 8;
  ctx.fillText('Welcome!', bx + 20, by + 26);
  ctx.shadowBlur = 0;

  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillStyle = '#bbb';
  ctx.fillText('Choose your game:', bx + 20, by + 46);

  var itemStartY = by + 68;
  var itemSpacing = 24;

  for (var i = 0; i < menuItems.length; i++) {
    var iy = itemStartY + i * itemSpacing;
    var isSelected = i === selectedIndex;

    if (isSelected) {
      ctx.fillStyle = 'rgba(212, 226, 15, 0.08)';
      ctx.fillRect(bx + 10, iy - 13, bw - 20, 20);

      var bob = Math.sin(Date.now() / 200) * 2;
      ctx.font = '12px "Press Start 2P", monospace';
      ctx.fillStyle = '#d4e20f';
      ctx.shadowColor = '#d4e20f';
      ctx.shadowBlur = 6;
      ctx.fillText('\u25B6', bx + 20 + bob, iy);
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#fff';
      ctx.fillText(menuItems[i].label, bx + 44, iy);
    } else {
      ctx.font = '12px "Press Start 2P", monospace';
      ctx.fillStyle = '#666';
      ctx.fillText(menuItems[i].label, bx + 44, iy);
    }
  }

  var ha = 0.5 + Math.sin(Date.now() / 400) * 0.3;
  var rightX = bx + bw - 70;
  var centerY = by + bh / 2;
  var lines = ['Press', 'A', 'To', 'Select'];
  var lineH = 18;
  var totalH = lines.length * lineH;
  var startY = centerY - totalH / 2 + lineH / 2 + 2;

  ctx.textAlign = 'center';
  ctx.font = '10px "Press Start 2P", monospace';

  for (var k = 0; k < lines.length; k++) {
    var ly = startY + k * lineH;
    if (lines[k] === 'A') {
      ctx.font = 'bold 14px "Press Start 2P", monospace';
      ctx.fillStyle = 'rgba(212, 226, 15, ' + ha + ')';
      ctx.shadowColor = '#d4e20f';
      ctx.shadowBlur = 8;
      ctx.fillText(lines[k], rightX, ly);
      ctx.shadowBlur = 0;
      ctx.font = '10px "Press Start 2P", monospace';
    } else {
      ctx.fillStyle = 'rgba(212, 226, 15, ' + ha + ')';
      ctx.fillText(lines[k], rightX, ly);
    }
  }

  ctx.textAlign = 'left';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Main render ---
function render() {
  if (!bgLoaded) return;

  ctx.drawImage(bgImg, 0, 0, 500, 320);

  var vig = ctx.createRadialGradient(250, 140, 100, 250, 160, 320);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, 500, 320);

  drawScanlines();
  drawSparkles();
  drawTitle();
  drawDialogueBox();
  updateSparkles();

  requestAnimationFrame(render);
}

// --- Audio (Web Audio API) ---
var audioCtx = null;
var sfxBuffers = { loop: null, move: null, select: null };
var loopGain = null;
var loopSource = null;
var loopTimeout = null;
var audioUnlocked = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  loopGain = audioCtx.createGain();
  loopGain.gain.value = 0.5;
  loopGain.connect(audioCtx.destination);
  var files = { loop: 'assets/1.wav', move: 'assets/2.wav', select: 'assets/3.wav' };
  Object.keys(files).forEach(function(key) {
    fetch(files[key]).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
      audioCtx.decodeAudioData(buf, function(decoded) { sfxBuffers[key] = decoded; startLoop(); });
    });
  });
}

// Attempt autoplay immediately — browser may block until first interaction
initAudio();

function playSfx(key) {
  if (!audioCtx || !sfxBuffers[key]) return;
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(function() { playSfxImmediate(key); });
    return;
  }
  playSfxImmediate(key);
}

function playSfxImmediate(key) {
  var src = audioCtx.createBufferSource();
  src.buffer = sfxBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

function startLoop() {
  if (!sfxBuffers.loop || !audioCtx || loopSource) return;
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(function() { startLoop(); });
    return;
  }
  var src = audioCtx.createBufferSource();
  src.buffer = sfxBuffers.loop;
  src.connect(loopGain);
  src.start(0);
  loopSource = src;
  src.onended = function() {
    loopSource = null;
    loopTimeout = setTimeout(startLoop, 1000);
  };
}

function stopLoop() {
  if (loopTimeout) { clearTimeout(loopTimeout); loopTimeout = null; }
  if (loopSource) { try { loopSource.stop(); } catch(e) {} loopSource = null; }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().then(function() { startLoop(); });
  }
}

// Unlock on first user gesture
['touchstart', 'mousedown', 'keydown'].forEach(function(evt) {
  document.addEventListener(evt, unlockAudio, { once: false });
});

// --- Controls ---
function moveUp() { unlockAudio(); selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length; playSfx('move'); }
function moveDown() { unlockAudio(); selectedIndex = (selectedIndex + 1) % menuItems.length; playSfx('move'); }
function goToSelected() {
  unlockAudio();
  stopLoop();
  playSfx('select');
  setTimeout(function() { window.location.href = menuItems[selectedIndex].url; }, 300);
}
function goToUrl(url) {
  unlockAudio();
  stopLoop();
  playSfx('select');
  setTimeout(function() { window.location.href = url; }, 300);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') moveUp();
  if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') moveDown();
  if (e.key === 'j' || e.key === 'J' || e.key === 'Enter') goToSelected();
});

document.getElementById('btnUp').addEventListener('touchstart', function(e) { e.preventDefault(); moveUp(); });
document.getElementById('btnDown').addEventListener('touchstart', function(e) { e.preventDefault(); moveDown(); });
document.getElementById('btnA').addEventListener('touchstart', function(e) { e.preventDefault(); goToSelected(); });
document.getElementById('btnUp').addEventListener('mousedown', function(e) { e.preventDefault(); moveUp(); });
document.getElementById('btnDown').addEventListener('mousedown', function(e) { e.preventDefault(); moveDown(); });
document.getElementById('btnA').addEventListener('mousedown', function(e) { e.preventDefault(); goToSelected(); });

canvas.addEventListener('click', function(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = 500 / rect.width;
  var sy = 320 / rect.height;
  var cx = (e.clientX - rect.left) * sx;
  var cy = (e.clientY - rect.top) * sy;
  if (cx >= 30 && cx <= 470) {
    if (cy >= 254 && cy <= 278) { selectedIndex = 0; goToSelected(); }
    if (cy >= 278 && cy <= 302) { selectedIndex = 1; goToSelected(); }
  }
});

canvas.addEventListener('touchstart', function(e) {
  var touch = e.touches[0];
  var rect = canvas.getBoundingClientRect();
  var sx = 500 / rect.width;
  var sy = 320 / rect.height;
  var cx = (touch.clientX - rect.left) * sx;
  var cy = (touch.clientY - rect.top) * sy;
  if (cx >= 30 && cx <= 470) {
    if (cy >= 254 && cy <= 278) { e.preventDefault(); selectedIndex = 0; goToSelected(); }
    if (cy >= 278 && cy <= 302) { e.preventDefault(); selectedIndex = 1; goToSelected(); }
  }
});
</script>
<script>
  // Burger menu (same pattern as Loading Fighters)
  var burger=document.getElementById('burgerBtn'),sMenu=document.getElementById('sideMenu'),
    overlay=document.getElementById('sideMenuOverlay'),closeB=document.getElementById('sideMenuClose');
  function toggleMenu(){sMenu.classList.toggle('open');overlay.classList.toggle('open');}
  burger.addEventListener('click',toggleMenu);overlay.addEventListener('click',toggleMenu);closeB.addEventListener('click',toggleMenu);
  // Intercept burger menu game links to play select SFX + stop loop
  var menuLinks = sMenu.querySelectorAll('a[href*="chill-200cpm"], a[href*="loading-fighters"], a[href*="sundar-keti"]');
  for (var i = 0; i < menuLinks.length; i++) {
    menuLinks[i].addEventListener('click', function(e) {
      e.preventDefault();
      var url = this.getAttribute('href');
      goToUrl(url);
    });
  }
</script>
</body>
</html>
